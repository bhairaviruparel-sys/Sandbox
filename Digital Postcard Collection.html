<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Box</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f7f0e6; --paper:#fdf8f0; --box-body:#8b5e3c; --box-dark:#5c3d1e;
    --box-mid:#a97548; --box-light:#c9915f; --lid:#7a4f2a; --lid-top:#9c6840;
    --ink:#2c1a0e; --stamp:#b5451b; --shadow:rgba(44,26,14,0.25);
  }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 30% 70%, rgba(139,94,60,0.07) 0%, transparent 55%), radial-gradient(ellipse at 75% 25%, rgba(180,140,90,0.06) 0%, transparent 50%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Lora', serif; color: var(--ink);
    padding: 40px 20px 60px; overflow-x: hidden; user-select: none;
   overflow-x: hidden;
  }
  .open-hint {
    font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--box-mid);
    display: flex; align-items: center; gap: 8px; margin-bottom: 28px;
    animation: pulse 2.5s ease-in-out infinite; transition: opacity 0.4s;
  }
  .open-hint.hidden { opacity: 0; pointer-events: none; }
  .open-hint svg { animation: bob 2.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  .scene { display: flex; flex-direction: column; align-items: center; }
 
  .deck-stage {
  position: relative;
  width: min(420px, 90vw);
  height: min(290px, 62vw);
  margin: 0 auto -10px auto;
  z-index: 6;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}
   
   .close-nudge {
  position: relative; /* change from absolute */
  bottom: auto;       /* reset */
  left: 50%;
  transform: translateX(-50%);
  margin-top: 14px;   /* space below box */
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: var(--box-mid);
  opacity: 0;
  transition: opacity 0.5s 1.4s;
  pointer-events: none;
  white-space: nowrap;
}

  }
  .counter {
    position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
    font-family: 'Caveat', cursive; font-size: 1rem; color: var(--box-mid);
    opacity: 0; transition: opacity 0.4s 0.8s; white-space: nowrap; pointer-events: none;
  }
  .counter.show { opacity: 0.7; }
  .close-nudge {
    position: absolute; bottom: -46px; left: 50%; transform: translateX(-50%);
    font-family: 'Caveat', cursive; font-size: 0.85rem; color: var(--box-mid);
    opacity: 0; transition: opacity 0.5s 1.4s; pointer-events: none; white-space: nowrap;
  }
  .close-nudge.show { opacity: 0.4; }
  .postcard {
  position: absolute;
  width: min(340px, 78vw);
  height: min(227px, 52vw);
  border-radius: 5px;
  cursor: grab;
  touch-action: none;
  will-change: transform;
  left: 50%;
  top: 50%;
  transform-origin: center center;
  margin-left: min(-170px, -39vw);
  margin-top: min(-113px, -26vw);
}
  .postcard:active { cursor: grabbing; }
  .card-inner {
    width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4,0,0.2,1);
    border-radius: 5px; pointer-events: none;
  }
  .postcard.flipped .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 5px; overflow: hidden; box-shadow: 2px 5px 18px rgba(44,26,14,0.26);
  }
  .card-back-face { transform: rotateY(180deg); }
  .card-face img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .box-wrap { position: relative; width: min(320px, 90vw); cursor: pointer; z-index: 2; }
  .lid { width: 100%; position: relative; z-index: 10; transition: transform 0.65s cubic-bezier(0.22,1,0.36,1); }
  .box-wrap.open .lid { transform: translateX(min(218px, 58vw)) translateY(-22px) rotate(17deg); }
  .lid-top {
    width: 100%; height: 22px;
    background: linear-gradient(to bottom, #b88050, var(--lid-top));
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.18), inset 0 -2px 4px rgba(0,0,0,0.18);
    position: relative;
  }
  .lid-top::after {
    content: ''; position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 0; width: 44px; height: 4px;
    background: var(--box-dark); opacity: 0.35; border-radius: 2px 2px 0 0;
  }
  .lid-front {
    width: 100%; height: 28px;
    background: linear-gradient(to bottom, var(--lid), #4a2e10);
    border-radius: 0 0 3px 3px; box-shadow: 0 4px 10px var(--shadow);
    position: relative; overflow: hidden;
  }
  .lid-front::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0px, transparent 20px, rgba(0,0,0,0.04) 20px, rgba(0,0,0,0.04) 21px);
  }
  .pull-tab {
    position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 11px;
    background: linear-gradient(to bottom, var(--box-mid), var(--box-dark));
    border-radius: 0 0 8px 8px; box-shadow: 0 3px 6px var(--shadow);
  }
  .box-body {
    width: 100%; height: min(210px, 58vw);
    background: linear-gradient(155deg, var(--box-light) 0%, var(--box-body) 45%, var(--box-dark) 100%);
    border-radius: 3px 3px 8px 8px; margin-top: -2px; position: relative; overflow: hidden;
    box-shadow: inset 2px 0 8px rgba(255,255,255,0.07), inset -2px 0 8px rgba(0,0,0,0.15), 0 10px 40px var(--shadow), 0 3px 10px rgba(44,26,14,0.18);
  }
  .box-body::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(168deg, transparent 0px, transparent 14px, rgba(0,0,0,0.025) 14px, rgba(0,0,0,0.025) 15px);
  }
  .box-inside {
    position: absolute; top: 0; left: 0; right: 0; height: 55px;
    background: linear-gradient(to bottom, #2a1404, #4a2208);
    opacity: 0; transition: opacity 0.35s 0.3s; z-index: 1;
  }
  .box-wrap.open .box-inside { opacity: 1; }
  .box-label {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    width: min(200px, 60%); background: var(--paper); border-radius: 2px;
    padding: 9px 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.18); z-index: 2;
  }
  .box-label::before {
    content: ''; position: absolute; inset: 4px;
    border: 1px dashed rgba(139,94,60,0.28); border-radius: 1px; pointer-events: none;
  }
  .label-main { font-family: 'Caveat', cursive; font-size: 1.1rem; font-weight: 700; color: var(--stamp); letter-spacing: 0.06em; }
  .corner { position: absolute; width: 13px; height: 13px; border-radius: 50%; background: radial-gradient(circle at 38% 38%, #d4a060, #7a4e1e); box-shadow: 0 1px 4px rgba(0,0,0,0.3); z-index: 2; }
  .corner.tl { top: 12px; left: 12px; } .corner.tr { top: 12px; right: 12px; }
  .corner.bl { bottom: 12px; left: 12px; } .corner.br { bottom: 12px; right: 12px; }

 @media (max-width: 600px) {
  .scene {
   display:flex;
   flex-direction:column;
   align-items: center;
    width: 100%
  }
  .deck-stage {
    width: 100%;
    height: min(240px, 70vw);
  }
  .postcard {
    width: min(320px, 85vw);
    height: min(213px, 57vw);
  }
  .box-wrap {
    width: min(240px, 75vw);
  }
  body {
    justify-content: center;
    padding: 20px 10px 40px;
  }
}
 
</style>
</head>
<body>
<a href="index.html" style="
  position: fixed;
  top: 20px;
  left: 20px;
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: #a97548;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 999;
">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
    <path d="M19 12H5M12 5l-7 7 7 7"/>
  </svg>
  Back
</a>
<p class="open-hint" id="openHint">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
    <path d="M19 9l-7 7-7-7"/>
  </svg>
  click the box to open
</p>

<div class="scene">
  <div class="deck-stage" id="deckStage">
    <p class="counter" id="counter"></p>
    <p class="close-nudge" id="closeNudge">drag the box down to close</p>
  </div>
  <div class="box-wrap" id="boxWrap">
    <div class="lid">
      <div class="lid-top"></div>
      <div class="lid-front"><div class="pull-tab"></div></div>
    </div>
    <div class="box-body">
      <div class="box-inside"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="box-label">
        <div class="label-main">✦ Card Collection ✦</div>
      </div>
    </div>
  </div>
</div>

<script>
  const CARDS = [
    { img: "Property1=front.png", back: "Property1=back.png", alt: "Mumbai" },
    { img: "Property2=front.png", back: "Property2=back.png", alt: "Chicago" },
    { img: "Property3=front.png", back: "Property3=back.png", alt: "Ramen Cat" },
    { img: "Property4=front.png", back: "Property4=back.png", alt: "Puppy" },
    { img: "Property5=front.png", back: "Property5=back.png", alt: "Beach" },
    { img: "Property6=front.png", back: "Property6=back.png", alt: "Cinque Terre" },
    { img: "Property7=front.png", back: "Property7=back.png", alt: "Dubai" },
  ];

  const N = CARDS.length;
  let isOpen = false;
  let order = [];
  let els = [];
  let flipped = [];
  let dragging = false;
  let startX = 0;
  let deltaX = 0;
  let isTap = true;
  let boxDown = false, boxDownY = 0;

  const stage   = document.getElementById('deckStage');
  const box     = document.getElementById('boxWrap');
  const hint    = document.getElementById('openHint');
  const nudge   = document.getElementById('closeNudge');
  const counterEl = document.getElementById('counter');

  function tf(pos) {
    if (pos === 0) return 'translateY(0px) rotate(0deg) scale(1)';
    const d   = Math.min(pos, 6);
    const rot = (d % 2 === 0 ? 1 : -1) * d * 0.9;
    const sc  = Math.max(0.87, 1 - d * 0.026);
    const y   = d * 4;
    return 'translateY(' + y + 'px) rotate(' + rot + 'deg) scale(' + sc + ')';
  }
  function zi(pos) { return Math.max(1, 20 - pos); }
  function sh(pos) {
    return pos === 0
      ? '3px 8px 28px rgba(44,26,14,0.32)'
      : '2px 4px 12px rgba(44,26,14,0.17)';
  }

  function updateCounter() {
    counterEl.textContent = ' ';
    // simpler: just show which card number is on top
    counterEl.textContent = (CARDS.indexOf(CARDS[order[0]]) + 1) + ' / ' + N;
  }

  function applyStack(anim) {
    order.forEach(function(cardIdx, stackPos) {
      var el = els[cardIdx];
      el.style.transition = anim
        ? 'transform 0.4s cubic-bezier(0.34,1.1,0.64,1), box-shadow 0.3s, opacity 0.3s'
        : 'none';
      el.style.zIndex    = zi(stackPos);
      el.style.boxShadow = sh(stackPos);
      el.style.opacity   = stackPos > 5 ? '0' : '1';
      el.style.transform = tf(stackPos);
    });
    counterEl.textContent = (order[0] + 1) + ' / ' + N;
  }

  function sendToBack(dir) {
    var topCardIdx = order[0];
    var el = els[topCardIdx];

    var flyX = dir === 'left' ? -450 : 450;
    var flyRot = dir === 'left' ? -20 : 20;
    el.style.transition = 'transform 0.32s cubic-bezier(0.4,0,1,0.6), opacity 0.28s';
    el.style.transform  = 'translateX(' + flyX + 'px) translateY(-20px) rotate(' + flyRot + 'deg) scale(0.9)';
    el.style.opacity    = '0';
    el.style.zIndex     = '0';

    // Move to back of order
    order.shift();
    order.push(topCardIdx);

    setTimeout(function() {
      // Reset silently to back position
      el.style.transition = 'none';
      el.style.opacity    = '1';
      el.style.transform  = tf(N - 1);
      el.style.zIndex     = zi(N - 1);
      el.style.boxShadow  = sh(N - 1);
      // Then animate the whole stack
      setTimeout(function() { applyStack(true); }, 30);
    }, 310);
  }

  function build() {
    stage.querySelectorAll('.postcard').forEach(function(e) { e.remove(); });
    els     = [];
    flipped = new Array(N).fill(false);
    order   = Array.from({length: N}, function(_, i) { return i; });

    CARDS.forEach(function(c, i) {
      var el = document.createElement('div');
      el.className = 'postcard';
      el.style.cssText = 'opacity:0; transform:translateY(220px) scale(0.86); transition:none; z-index:1;';

      var inner = document.createElement('div');
      inner.className = 'card-inner';

      var front = document.createElement('div');
      front.className = 'card-face';
      var fi = document.createElement('img');
      fi.src = c.img; fi.alt = c.alt;
      front.appendChild(fi);

      var back = document.createElement('div');
      back.className = 'card-face card-back-face';
      var bi = document.createElement('img');
      bi.src = c.back; bi.alt = c.alt + ' back';
      back.appendChild(bi);

      inner.appendChild(front);
      inner.appendChild(back);
      el.appendChild(inner);
      stage.appendChild(el);
      els[i] = el;

      setTimeout(function() {
        el.style.transition = 'transform 0.55s cubic-bezier(0.22,1.2,0.4,1) ' + (i*48) + 'ms, opacity 0.35s ease ' + (i*48) + 'ms';
        el.style.opacity    = '1';
        el.style.transform  = tf(i);
        el.style.zIndex     = zi(i);
        el.style.boxShadow  = sh(i);
      }, 340 + i * 48);
    });

    setTimeout(function() {
      applyStack(false);
      listen();
      nudge.classList.add('show');
      counterEl.classList.add('show');
    }, 340 + N * 48 + 560);
  }

  function listen() {
    stage.addEventListener('mousedown',  onStart);
    stage.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onEnd);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend',  onEnd);

    stage.addEventListener('click', function() {
      if (Math.abs(deltaX) > 6) return;
      var idx = order[0];
      flipped[idx] = !flipped[idx];
      els[idx].classList.toggle('flipped', flipped[idx]);
    });
  }

  function onStart(e) {
    if (!isOpen) return;
    dragging = true; isTap = true;
    startX   = e.touches ? e.touches[0].clientX : e.clientX;
    deltaX   = 0;
    var el = els[order[0]];
    if (!el) return;
    el.style.transition = 'box-shadow 0.2s';
    el.style.boxShadow  = '6px 16px 36px rgba(44,26,14,0.38)';
    el.style.zIndex     = '30';
  }

  function onMove(e) {
    if (!dragging) return;
    if (e.cancelable) e.preventDefault();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    deltaX = cx - startX;
    if (Math.abs(deltaX) > 6) isTap = false;
    var el = els[order[0]];
    if (!el) return;
    var lift = Math.min(Math.abs(deltaX) * 0.08, 14);
    var rot  = deltaX * 0.045;
    el.style.transition = 'box-shadow 0.15s';
    el.style.transform  = 'translateX(' + deltaX + 'px) translateY(' + (-lift) + 'px) rotate(' + rot + 'deg) scale(1.04)';

    // Peek next card
    if (order.length > 1 && Math.abs(deltaX) > 20) {
      var nextEl   = els[order[1]];
      var peekY    = Math.max(0, 4 - Math.min(deltaX / 10, 4));
      nextEl.style.transition = 'transform 0.1s';
      nextEl.style.transform  = 'translateY(' + peekY + 'px) rotate(-0.9deg) scale(0.974)';
    }
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    var el = els[order[0]];
    if (!el) return;

    if (!isTap && Math.abs(deltaX) > 60) {
      sendToBack(deltaX < 0 ? 'left' : 'right');
    } else {
      el.style.transition = 'transform 0.4s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.3s';
      el.style.transform  = tf(0);
      el.style.boxShadow  = sh(0);
      el.style.zIndex     = zi(0);
      if (order.length > 1) {
        var nextEl = els[order[1]];
        nextEl.style.transition = 'transform 0.4s cubic-bezier(0.34,1.2,0.64,1)';
        nextEl.style.transform  = tf(1);
      }
    }
    deltaX = 0;
  }

  box.addEventListener('click', function() { if (!isOpen) open(); });
  box.addEventListener('mousedown',  function(e) { boxDown = true; boxDownY = e.clientY; });
  box.addEventListener('touchstart', function(e) { boxDown = true; boxDownY = e.touches[0].clientY; }, { passive: true });
  box.addEventListener('mouseup',    function(e) { if (boxDown && isOpen && e.clientY - boxDownY > 35) close(); boxDown = false; });
  box.addEventListener('touchend',   function(e) { if (boxDown && isOpen && e.changedTouches[0].clientY - boxDownY > 35) close(); boxDown = false; });

const lid = box.querySelector('.lid');
lid.addEventListener('click', function(e) {
  if (isOpen) {
    e.stopPropagation(); // prevent triggering other click handlers
    close(); // put cards back and close box
  }
});

  function open() {
    isOpen = true;
    box.classList.add('open');
    box.style.cursor = 'default';
    hint.classList.add('hidden');
    build();
  }

  function close() {
  if (!isOpen) return;
  isOpen = false;
  nudge.classList.remove('show');
  counterEl.classList.remove('show');

  stage.removeEventListener('mousedown',  onStart);
  stage.removeEventListener('touchstart', onStart);
  window.removeEventListener('mousemove', onMove);
  window.removeEventListener('mouseup',   onEnd);
  window.removeEventListener('touchmove', onMove);
  window.removeEventListener('touchend',  onEnd);

  // Reset cards to their original positions
  els.forEach(function(el, i) {
    el.classList.remove('flipped');
    el.style.transition = 'transform 0.42s cubic-bezier(0.4,0,0.8,0.6) ' + (i*32) + 'ms, opacity 0.32s ease ' + (i*32) + 'ms';
    el.style.transform  = 'translateY(220px) scale(0.85)';
    el.style.opacity    = '0';
  });

  // Reset the order so next open is same sequence
  order = Array.from({length: N}, (_, i) => i);
  flipped = new Array(N).fill(false);

  setTimeout(function() {
    stage.querySelectorAll('.postcard').forEach(e => e.remove());
    els = [];
    box.classList.remove('open');
    box.style.cursor = 'pointer';
    hint.classList.remove('hidden');
  }, 480 + N * 32);
}
 
</script>
</body>
</html>

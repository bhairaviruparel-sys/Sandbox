<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Time 🧩</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F0EBD8;
      --teal: #3D8B7A;
      --blue: #4A7A8A;
      --coral: #D97070;
      --pink: #F48080;
      --dark: #2a2a2a;
      --gap: 2px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      overflow-x: hidden;
    }

    /* Decorative top puzzle shapes */
    .deco-top {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 130px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }

    /* Pink accent dashes scattered around */
    .dash {
      position: fixed;
      width: 18px; height: 5px;
      border-radius: 10px;
      background: var(--pink);
      pointer-events: none;
      opacity: 0.55;
    }
    .d1 { top: 155px; left: 38%; transform: rotate(-30deg); }
    .d2 { top: 390px; left: 12%; transform: rotate(80deg); }
    .d3 { top: 680px; right: 10%; transform: rotate(-15deg); }
    .d4 { top: 700px; right: 18%; transform: rotate(40deg); width:12px; }
    .d5 { top: 170px; right: 25%; transform: rotate(10deg); }

    /* Grey dots */
    .gdot { position: fixed; border-radius: 50%; background: #aaa; pointer-events: none; opacity: 0.3; }
    .gd1 { width: 18px; height: 18px; top: 120px; right: 22%; }
    .gd2 { width: 12px; height: 12px; top: 130px; right: 28%; }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      text-align: center;
    }
    h1 .accent { color: var(--teal); }

    .subtitle {
      font-size: 0.88rem;
      color: #999;
      font-weight: 600;
      margin-bottom: 26px;
      text-align: center;
    }
    .subtitle kbd {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 0.78rem;
      font-family: monospace;
      color: #666;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:active { transform: scale(0.95) !important; }
    .btn-teal {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 4px 16px rgba(61,139,122,0.32);
    }
    .btn-teal:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(61,139,122,0.4); }

    .puzzle-wrap { position: relative; }

    #puzzleGrid {
      display: grid;
      gap: var(--gap);
      background: transparent;
      padding: var(--gap);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 4px 14px rgba(0,0,0,0.1);
      outline: none;
    }
    #puzzleGrid:focus-visible { outline: 3px solid var(--teal); outline-offset: 4px; }

    .tile {
      position: relative;
      cursor: grab;
      border-radius: 4px;
      overflow: hidden;
      background-repeat: no-repeat;
      transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), box-shadow 0.12s;
      will-change: transform;
    }
    .tile:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      z-index: 2;
    }
    .tile.drop-target {
      outline: 3px solid var(--teal);
      outline-offset: -3px;
      transform: scale(1.05);
      box-shadow: 0 0 0 4px rgba(61,139,122,0.3);
      z-index: 3;
    }

    /* Win overlay */
    .win-toast {
  display: none;
  position: fixed;
  bottom: 40px;
  left: 50%;
  background: #fff;
  border-radius: 20px;
  border: 2px solid #5BC4F5;
  padding: 32px 48px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  flex-direction: column;
  align-items: center;
  gap: 14px;
  z-index: 999;
  opacity: 0;
  min-width: 320px;
  text-align: center;
}
.win-toast.show {
  display: flex;
  animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(30px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.win-toast-emoji { font-size: 3rem; }
.win-toast-text  { font-size: 1.4rem; font-weight: 800; color: #1a1a1a; }

    .preview-section {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .preview-label { font-size: 0.72rem; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    .preview-img {
      width: 88px; height: 88px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 4px 14px rgba(0,0,0,0.13);
      border: 3px solid #fff;
    }

    .img-error-note {
      display: none;
      margin-top: 14px;
      background: #fff8e6;
      border: 1.5px solid #f5d67a;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.8rem;
      color: #a07000;
      font-weight: 700;
      max-width: 360px;
      text-align: center;
      line-height: 1.6;
    }
    .img-error-note code {
      background: #fef0c0;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

<!-- Decorative background puzzle pieces (SVG) -->
<svg class="deco-top" viewBox="0 0 1200 130" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <rect x="0"   y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="110" cy="15" r="18" fill="#F0EBD8"/>
  <rect x="115" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="115" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="170" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="230" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="230" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="285" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="345" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="400" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="580" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="580" cy="15" r="18" fill="#F0EBD8"/>
  <rect x="695" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="750" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="810" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="810" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="865" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="925" y="-40" width="140" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="925" cy="15" r="18" fill="#F0EBD8"/>
  <rect x="1070" y="-40" width="140" height="110" rx="8" fill="#b8aa7a"/>
  <circle cx="1125" cy="-40" r="18" fill="#F0EBD8"/>
</svg>

<div class="dash d1"></div>
<div class="dash d2"></div>
<div class="dash d3"></div>
<div class="dash d4"></div>
<div class="dash d5"></div>
<div class="gdot gd1"></div>
<div class="gdot gd2"></div>

<div class="card">
  <h1>Puzzle <span class="accent">Time!</span> 🧩</h1>
  <p class="subtitle">Drag any tile and drop it on another to swap them</p>

  <div class="puzzle-wrap">
    <div id="puzzleGrid" tabindex="0" role="grid" aria-label="Sliding puzzle"></div>
    <div class="win-overlay" id="winOverlay">
      <button class="btn btn-teal" onclick="newGame()" style="margin-top:10px">Play Again</button>
    </div>
  </div>

  <div class="win-toast" id="winToast">
  <div class="win-toast-emoji"></div>
  <div class="win-toast-text">Yayyy !! Well Done</div>
</div>

  <div class="preview-section">
    <div class="preview-label">Reference Image</div>
    <img class="preview-img" src="./puzzle.png" id="previewImg" alt="Puzzle reference" />
  </div>

  <div class="img-error-note" id="imgError">
    ⚠️ The Figma asset link has expired (they last ~7 days).<br>
    Export the image from Figma, save it next to this file as <code>puzzle.png</code>,<br>
    then change <code>IMAGE_URL</code> at the top of the &lt;script&gt; to <code>"./puzzle.png"</code>.
  </div>
</div>

<script>
  // ── CONFIGURATION ─────────────────────────────────────────────────────────
  // After the Figma URL expires (~7 days), export your image from Figma and
  // replace this with a local path, e.g. "./puzzle.png"
  const IMAGE_URL = "./puzzle.png";
  // ──────────────────────────────────────────────────────────────────────────

  let n = 4, grid, tileSize;
  let dragFromIdx = null, dragEl = null, dragClone = null, dragStartX = 0, dragStartY = 0;
  let hoverIdx = null;

  const puzzleGrid = document.getElementById('puzzleGrid');
  const winOverlay = document.getElementById('winOverlay');
  const previewImg = document.getElementById('previewImg');
  const imgError   = document.getElementById('imgError');

  // Pre-load image first, then start
  const img = new Image();
  img.onload = () => { previewImg.src = IMAGE_URL; newGame(); };
  img.onerror = () => { imgError.style.display = 'block'; previewImg.style.display = 'none'; newGame(); };
  img.src = IMAGE_URL;

  function newGame() {
    tileSize = calcTileSize();
    winOverlay.classList.remove('show');
    // All n*n tiles — no blank
    grid = [...Array(n * n).keys()];
    // Shuffle by random swaps
    for (let i = grid.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [grid[i], grid[j]] = [grid[j], grid[i]];
    }
    render();
  }

  function calcTileSize() {
    const maxBoard = Math.min(window.innerWidth - 52, 500);
    return Math.floor((maxBoard - (n + 1) * 5) / n);
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function render() {
    puzzleGrid.style.gridTemplateColumns = `repeat(${n}, ${tileSize}px)`;
    puzzleGrid.innerHTML = '';

    grid.forEach((val, idx) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.width  = tileSize + 'px';
      tile.style.height = tileSize + 'px';
      tile.dataset.idx  = idx;

      const srcRow = Math.floor(val / n);
      const srcCol = val % n;
      const bgSz   = tileSize * n;
      tile.style.backgroundImage    = `url('${IMAGE_URL}')`;
      tile.style.backgroundSize     = `${bgSz}px ${bgSz}px`;
      tile.style.backgroundPosition = `-${srcCol * tileSize}px -${srcRow * tileSize}px`;

      tile.addEventListener('mousedown',  e => onDragStart(e, idx));
      tile.addEventListener('touchstart', e => onDragStart(e, idx), { passive: false });

      puzzleGrid.appendChild(tile);
    });
  }

  // ── DRAG START ────────────────────────────────────────────────────────────
  function onDragStart(e, idx) {
    e.preventDefault();
    dragFromIdx = idx;
    dragEl = puzzleGrid.children[idx];

    const pt = getPoint(e);
    dragStartX = pt.x;
    dragStartY = pt.y;

    const rect = dragEl.getBoundingClientRect();
    dragClone = dragEl.cloneNode(true);
    Object.assign(dragClone.style, {
      position:      'fixed',
      left:          rect.left + 'px',
      top:           rect.top  + 'px',
      width:         tileSize  + 'px',
      height:        tileSize  + 'px',
      zIndex:        '999',
      borderRadius:  '8px',
      boxShadow:     '0 16px 40px rgba(0,0,0,0.4)',
      pointerEvents: 'none',
      transition:    'none',
      transform:     'scale(1.08)',
      cursor:        'grabbing',
    });
    document.body.appendChild(dragClone);
    dragEl.style.opacity = '0.25';

    document.addEventListener('mousemove',  onDragMove);
    document.addEventListener('mouseup',    onDragEnd);
    document.addEventListener('touchmove',  onDragMove, { passive: false });
    document.addEventListener('touchend',   onDragEnd);
  }

  // ── DRAG MOVE ─────────────────────────────────────────────────────────────
  function onDragMove(e) {
    e.preventDefault();
    if (!dragClone) return;
    const pt = getPoint(e);
    const dx = pt.x - dragStartX;
    const dy = pt.y - dragStartY;
    dragClone.style.transform = `translate(${dx}px, ${dy}px) scale(1.08)`;

    // Highlight tile under cursor
    const el = document.elementFromPoint(pt.x, pt.y);
    const overTile = el && el.closest('.tile');
    const overIdx  = overTile ? parseInt(overTile.dataset.idx) : null;

    // Clear previous highlight
    if (hoverIdx !== null && hoverIdx !== dragFromIdx) {
      const prev = puzzleGrid.children[hoverIdx];
      if (prev) prev.classList.remove('drop-target');
    }
    // Set new highlight
    if (overIdx !== null && overIdx !== dragFromIdx) {
      puzzleGrid.children[overIdx].classList.add('drop-target');
      hoverIdx = overIdx;
    } else {
      hoverIdx = null;
    }
  }

  // ── DRAG END ──────────────────────────────────────────────────────────────
  function onDragEnd(e) {
    document.removeEventListener('mousemove',  onDragMove);
    document.removeEventListener('mouseup',    onDragEnd);
    document.removeEventListener('touchmove',  onDragMove);
    document.removeEventListener('touchend',   onDragEnd);

    if (dragClone) { dragClone.remove(); dragClone = null; }
    if (dragEl)    { dragEl.style.opacity = ''; dragEl = null; }

    // Clear highlights
    document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('drop-target'));

    const pt = getPoint(e);
    const el = document.elementFromPoint(pt.x, pt.y);
    const overTile = el && el.closest ? el.closest('[data-idx]') : null;
    const dropIdx  = overTile ? parseInt(overTile.dataset.idx) : null;

    if (dropIdx !== null && dropIdx !== dragFromIdx) {
      // Swap the two tiles
      [grid[dragFromIdx], grid[dropIdx]] = [grid[dropIdx], grid[dragFromIdx]];
    }

    dragFromIdx = null;
    hoverIdx    = null;
    render();
    if (checkWin()) winOverlay.classList.add('show');
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function getPoint(e) {
    if (e.touches && e.touches.length)              return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function checkWin() { return grid.every((v, i) => v === i); }

  window.addEventListener('resize', () => { tileSize = calcTileSize(); render(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Time 🧩</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F0EBD8;
      --teal: #3D8B7A;
      --pink: #F48080;
      --dark: #2a2a2a;
      --gap: 2px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      overflow-x: hidden;
    }

    .deco-top {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 130px;
      pointer-events: none; z-index: 0; opacity: 0.18;
    }
    .dash { position: fixed; width: 18px; height: 5px; border-radius: 10px; background: var(--pink); pointer-events: none; opacity: 0.55; }
    .d1 { top: 155px; left: 38%; transform: rotate(-30deg); }
    .d2 { top: 390px; left: 12%; transform: rotate(80deg); }
    .d3 { top: 680px; right: 10%; transform: rotate(-15deg); }
    .d4 { top: 700px; right: 18%; transform: rotate(40deg); width:12px; }
    .d5 { top: 170px; right: 25%; transform: rotate(10deg); }
    .gdot { position: fixed; border-radius: 50%; background: #aaa; pointer-events: none; opacity: 0.3; }
    .gd1 { width: 18px; height: 18px; top: 120px; right: 22%; }
    .gd2 { width: 12px; height: 12px; top: 130px; right: 28%; }

    .card { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

    h1 { font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 900; color: var(--dark); letter-spacing: -0.5px; margin-bottom: 4px; text-align: center; }
    h1 .accent { color: var(--teal); }
    .subtitle { font-size: 0.88rem; color: #999; font-weight: 600; margin-bottom: 14px; text-align: center; }

    .puzzle-dots { display: flex; gap: 8px; margin-bottom: 10px; }
    .puzzle-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ccc; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      position: relative;
    }
    .puzzle-dot.active { background: var(--teal); transform: scale(1.3); }
    .puzzle-dot.solved::after {
     position: absolute; top: -18px; left: 50%;
      transform: translateX(-50%); font-size: 0.6rem; color: var(--teal); font-weight: 900;
    }

    .puzzle-badge {
      font-size: 0.72rem; font-weight: 800; color: var(--teal);
      background: rgba(61,139,122,0.1); border-radius: 20px;
      padding: 3px 12px; margin-bottom: 18px; letter-spacing: 0.05em; text-transform: uppercase;
    }

    .btn {
      padding: 10px 22px; border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800;
      cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:active { transform: scale(0.95) !important; }
    .btn-teal { background: var(--teal); color: #fff; box-shadow: 0 4px 16px rgba(61,139,122,0.32); }
    .btn-teal:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(61,139,122,0.4); }
    .btn-outline { background: transparent; color: var(--teal); border: 2px solid var(--teal); }
    .btn-outline:hover { background: rgba(61,139,122,0.07); transform: translateY(-2px); }

    .puzzle-wrap { position: relative; }

    #puzzleGrid {
      display: grid; gap: var(--gap); background: transparent; padding: var(--gap);
      border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 4px 14px rgba(0,0,0,0.1); outline: none;
    }

    .tile {
      position: relative; cursor: grab; border-radius: 4px; overflow: hidden;
      background-repeat: no-repeat;
      transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), box-shadow 0.12s;
    }
    .tile:hover { transform: scale(1.04); box-shadow: 0 6px 18px rgba(0,0,0,0.25); z-index: 2; }
    .tile.drop-target { outline: 3px solid var(--teal); outline-offset: -3px; transform: scale(1.05); z-index: 3; }

    /* ── WIN TOAST ── */
    #winToast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #fff;
      border-radius: 20px;
      border: 2px solid #5BC4F5;
      padding: 28px 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      min-width: 300px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(.34,1.3,.64,1), opacity 0.4s ease;
    }
    #winToast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }
    #winToast.all-solved { border-color: #f5c842; background: linear-gradient(135deg, #fffdf0, #fff); }
    .win-toast-emoji   { font-size: 3rem; }
    .win-toast-text    { font-size: 1.3rem; font-weight: 800; color: #1a1a1a; }
    .win-toast-subtext { font-size: 0.82rem; color: #999; font-weight: 600; }
    .win-toast-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .preview-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .preview-label { font-size: 0.72rem; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    .preview-img { width: 88px; height: 88px; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 14px rgba(0,0,0,0.13); border: 3px solid #fff; }

    .img-error-note {
      display: none; margin-top: 14px; background: #fff8e6; border: 1.5px solid #f5d67a;
      border-radius: 12px; padding: 12px 18px; font-size: 0.8rem; color: #a07000;
      font-weight: 700; max-width: 360px; text-align: center; line-height: 1.6;
    }
  </style>
</head>
<body>

<svg class="deco-top" viewBox="0 0 1200 130" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

  <rect x="115" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="115" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="170" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="230" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="230" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="285" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="345" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="400" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="580" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="580" cy="15" r="18" fill="#F0EBD8"/>
  <rect x="695" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="750" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="810" y="-40" width="110" height="110" rx="8" fill="#b8aa7a"/><circle cx="810" cy="15" r="18" fill="#F0EBD8"/>
  <circle cx="865" cy="-40" r="18" fill="#F0EBD8"/>
  <rect x="925" y="-40" width="140" height="110" rx="8" fill="#b8aa7a"/><circle cx="925" cy="15" r="18" fill="#F0EBD8"/>
  <rect x="1070" y="-40" width="140" height="110" rx="8" fill="#b8aa7a"/><circle cx="1125" cy="-40" r="18" fill="#F0EBD8"/>
</svg>

<div class="dash d1"></div><div class="dash d2"></div><div class="dash d3"></div>
<div class="dash d4"></div><div class="dash d5"></div>
<div class="gdot gd1"></div><div class="gdot gd2"></div>

<div class="card">
  <h1>Piece It <span class="accent">Together !</span> 🧩</h1>
  <p class="subtitle">Drag any tile and drop it on another to swap them</p>

  <div class="puzzle-dots">
    <div class="puzzle-dot active" id="dot0" onclick="switchPuzzle(0)" title="Puzzle 1"></div>
    <div class="puzzle-dot"        id="dot1" onclick="switchPuzzle(1)" title="Puzzle 2"></div>
  </div>

  <div class="puzzle-badge" id="puzzleBadge">Puzzle 1 of 2</div>

  <div class="puzzle-wrap">
    <div id="puzzleGrid" tabindex="0" role="grid" aria-label="Sliding puzzle"></div>
  </div>

  <div class="preview-section">
    <div class="preview-label">Reference Image</div>
    <img class="preview-img" id="previewImg" alt="Puzzle reference" />
  </div>

  <div class="img-error-note" id="imgError">
    ⚠️ Puzzle image not found. Make sure <code>puzzle.png</code> and <code>puzzle_2.png</code> are in the same folder.
  </div>
</div>

<!-- Win Toast — lives outside .card so nothing interferes with it -->
<div id="winToast">
  <div class="win-toast-emoji"   id="winEmoji">🎉</div>
  <div class="win-toast-text"    id="winText">Yayyy!! Well Done</div>
  <div class="win-toast-subtext" id="winSub"></div>
  <div class="win-toast-buttons" id="winBtns"></div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const PUZZLES = [
    { src: './puzzle.png',   label: 'Puzzle 1 of 2' },
    { src: './puzzle_2.png', label: 'Puzzle 2 of 2' },
  ];
  // ─────────────────────────────────────────────────────────────────────────

  let currentPuzzle = 0;
  let IMAGE_URL     = PUZZLES[0].src;
  const solved      = [false, false];
  let toastTimer    = null;

  let n = 4, grid, tileSize;
  let dragFromIdx = null, dragEl = null, dragClone = null;
  let dragStartX = 0, dragStartY = 0, hoverIdx = null;

  const puzzleGrid = document.getElementById('puzzleGrid');
  const previewImg = document.getElementById('previewImg');
  const imgError   = document.getElementById('imgError');
  const winToast   = document.getElementById('winToast');
  const winEmoji   = document.getElementById('winEmoji');
  const winText    = document.getElementById('winText');
  const winSub     = document.getElementById('winSub');
  const winBtns    = document.getElementById('winBtns');
  const badge      = document.getElementById('puzzleBadge');

  // ── LOAD PUZZLE ───────────────────────────────────────────────────────────
  function loadPuzzle(idx) {
    currentPuzzle      = idx;
    IMAGE_URL          = PUZZLES[idx].src;
    badge.textContent  = PUZZLES[idx].label;
    imgError.style.display = 'none';
    document.querySelectorAll('.puzzle-dot').forEach((d, i) => d.classList.toggle('active', i === idx));

    const img   = new Image();
    img.onload  = () => { previewImg.src = IMAGE_URL; previewImg.style.display = ''; newGame(); };
    img.onerror = () => { imgError.style.display = 'block'; previewImg.style.display = 'none'; newGame(); };
    img.src     = IMAGE_URL;
  }

  function switchPuzzle(idx) { hideToast(); loadPuzzle(idx); }

  // ── WIN TOAST ─────────────────────────────────────────────────────────────
  function showToast() {
    // Mark solved
    solved[currentPuzzle] = true;
    document.getElementById('dot' + currentPuzzle).classList.add('solved');

    const bothSolved = solved[0] && solved[1];
    const otherIdx   = currentPuzzle === 0 ? 1 : 0;

    // Reset toast state completely
    winToast.classList.remove('visible', 'all-solved');

    if (bothSolved) {
      winEmoji.textContent = '🏆';
      winText.textContent  = 'You solved them all!';
      winSub.textContent   = 'Incredible — both puzzles complete!';
      winToast.classList.add('all-solved');
      winBtns.innerHTML    = `
        <button class="btn btn-teal"    onclick="replayPuzzle(0)">Puzzle 1 Again</button>
        <button class="btn btn-outline" onclick="replayPuzzle(1)">Puzzle 2 Again</button>
      `;
    } else {
      winEmoji.textContent = '🎉';
      winText.textContent  = 'Yayyy!! Well Done';
      winSub.textContent   = 'Puzzle ' + (currentPuzzle + 1) + ' complete!';
      winBtns.innerHTML    = `
        <button class="btn btn-teal"    onclick="playAgain()">Play Again</button>
        <button class="btn btn-outline" onclick="switchPuzzle(${otherIdx}); hideToast();">Try Puzzle ${otherIdx + 1}</button>
      `;
    }

    // Force a reflow so the transition fires fresh every time
    winToast.offsetHeight;
    winToast.classList.add('visible');

    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 8000);
  }

  function hideToast() {
    if (toastTimer) clearTimeout(toastTimer);
    winToast.classList.remove('visible');
  }

  function playAgain() {
    hideToast();
    solved[currentPuzzle] = false;
    document.getElementById('dot' + currentPuzzle).classList.remove('solved');
    newGame();
  }

  function replayPuzzle(idx) {
    hideToast();
    solved[idx] = false;
    document.getElementById('dot' + idx).classList.remove('solved');
    switchPuzzle(idx);
  }

  // ── GAME ──────────────────────────────────────────────────────────────────
  function newGame() {
    tileSize = calcTileSize();
    grid     = [...Array(n * n).keys()];
    for (let i = grid.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [grid[i], grid[j]] = [grid[j], grid[i]];
    }
    render();
  }

  function calcTileSize() {
    return Math.floor((Math.min(window.innerWidth - 52, 500) - (n + 1) * 5) / n);
  }

  function render() {
    puzzleGrid.style.gridTemplateColumns = `repeat(${n}, ${tileSize}px)`;
    puzzleGrid.innerHTML = '';
    grid.forEach((val, idx) => {
      const tile        = document.createElement('div');
      tile.className    = 'tile';
      tile.style.width  = tileSize + 'px';
      tile.style.height = tileSize + 'px';
      tile.dataset.idx  = idx;
      const bgSz = tileSize * n;
      tile.style.backgroundImage    = `url('${IMAGE_URL}')`;
      tile.style.backgroundSize     = `${bgSz}px ${bgSz}px`;
      tile.style.backgroundPosition = `-${(val % n) * tileSize}px -${Math.floor(val / n) * tileSize}px`;
      tile.addEventListener('mousedown',  e => onDragStart(e, idx));
      tile.addEventListener('touchstart', e => onDragStart(e, idx), { passive: false });
      puzzleGrid.appendChild(tile);
    });
  }

  // ── DRAG ──────────────────────────────────────────────────────────────────
  function onDragStart(e, idx) {
    e.preventDefault();
    dragFromIdx = idx;
    dragEl      = puzzleGrid.children[idx];
    const pt    = getPoint(e);
    dragStartX  = pt.x; dragStartY = pt.y;
    const rect  = dragEl.getBoundingClientRect();
    dragClone   = dragEl.cloneNode(true);
    Object.assign(dragClone.style, {
      position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
      width: tileSize + 'px', height: tileSize + 'px', zIndex: '9998',
      borderRadius: '8px', boxShadow: '0 16px 40px rgba(0,0,0,0.4)',
      pointerEvents: 'none', transition: 'none', transform: 'scale(1.08)', cursor: 'grabbing',
    });
    document.body.appendChild(dragClone);
    dragEl.style.opacity = '0.25';
    document.addEventListener('mousemove',  onDragMove);
    document.addEventListener('mouseup',    onDragEnd);
    document.addEventListener('touchmove',  onDragMove, { passive: false });
    document.addEventListener('touchend',   onDragEnd);
  }

  function onDragMove(e) {
    e.preventDefault();
    if (!dragClone) return;
    const pt = getPoint(e);
    dragClone.style.transform = `translate(${pt.x - dragStartX}px, ${pt.y - dragStartY}px) scale(1.08)`;
    const overTile = document.elementFromPoint(pt.x, pt.y)?.closest('.tile');
    const overIdx  = overTile ? parseInt(overTile.dataset.idx) : null;
    if (hoverIdx !== null && hoverIdx !== dragFromIdx) puzzleGrid.children[hoverIdx]?.classList.remove('drop-target');
    if (overIdx  !== null && overIdx  !== dragFromIdx) { puzzleGrid.children[overIdx].classList.add('drop-target'); hoverIdx = overIdx; }
    else hoverIdx = null;
  }

  function onDragEnd(e) {
    document.removeEventListener('mousemove',  onDragMove);
    document.removeEventListener('mouseup',    onDragEnd);
    document.removeEventListener('touchmove',  onDragMove);
    document.removeEventListener('touchend',   onDragEnd);
    if (dragClone) { dragClone.remove(); dragClone = null; }
    if (dragEl)    { dragEl.style.opacity = ''; dragEl = null; }
    document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('drop-target'));
    const pt      = getPoint(e);
    const dropIdx = document.elementFromPoint(pt.x, pt.y)?.closest('[data-idx]');
    const di      = dropIdx ? parseInt(dropIdx.dataset.idx) : null;
    if (di !== null && di !== dragFromIdx) [grid[dragFromIdx], grid[di]] = [grid[di], grid[dragFromIdx]];
    dragFromIdx = null; hoverIdx = null;
    render();
    if (checkWin()) showToast();
  }

  function getPoint(e) {
    if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
    if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function checkWin() {
  const contentTiles = [1, 2, 4, 5, 6, 8, 9, 10];
  return contentTiles.every(i => grid[i] === i);
}

  window.addEventListener('resize', () => { tileSize = calcTileSize(); render(); });

  loadPuzzle(0);
</script>
</body>
</html>
